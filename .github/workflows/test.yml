name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        working-directory: server
        run: |
          chmod +x mvnw
          ./mvnw test
        env:
          JWT_SECRET: testsecretthatisjustenoughcharacterslong
          JWT_EXPIRATION: 86400000

  test-client:
    name: Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
          VITE_SOCKETIO_URL: http://localhost:3001