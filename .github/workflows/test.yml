name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        working-directory: server
        run: |
          chmod +x mvnw
          ./mvnw test
        env:
          JWT_SECRET: testsecretthatisjustenoughcharacterslong
          JWT_EXPIRATION: 86400000