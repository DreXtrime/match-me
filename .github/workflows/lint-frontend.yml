name: Lint Frontend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '26'

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Check formatting
        working-directory: client
        run: npm run format:check